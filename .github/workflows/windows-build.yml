name: Windows build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify release contract
        shell: powershell
        run: .\tests\verify-release-contract.ps1

      - name: Build application outside repository
        shell: powershell
        run: |
          $exe = Join-Path $env:RUNNER_TEMP "WindowLayoutLauncher-ci.exe"
          .\build.ps1 -OutputPath $exe
          "CI_EXE=$exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify executable
        shell: powershell
        run: |
          if (-not (Test-Path -LiteralPath $env:CI_EXE)) {
            throw "Build did not produce: $env:CI_EXE"
          }
          Get-Item -LiteralPath $env:CI_EXE | Format-List Name, Length, LastWriteTime

      - name: Verify build did not modify tracked files
        shell: powershell
        run: |
          $changes = git status --short
          if ($changes) {
            Write-Host $changes
            throw "Build modified tracked files or created unexpected repository files."
          }
