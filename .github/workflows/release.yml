name: Release Windows app

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate tag and version metadata
        shell: powershell
        run: |
          $metadata = Get-Content -LiteralPath "version.json" -Raw -Encoding UTF8 | ConvertFrom-Json
          $tagVersion = $env:GITHUB_REF_NAME.TrimStart('v')
          if ($metadata.version -ne $tagVersion) {
            throw "Tag version $tagVersion does not match version.json $($metadata.version)."
          }

      - name: Build release files outside repository
        shell: powershell
        run: |
          $releaseDir = Join-Path $env:RUNNER_TEMP "WindowLayoutLauncher-release"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          $exe = Join-Path $releaseDir "窗口布局启动器.exe"
          .\build.ps1 -OutputPath $exe
          "RELEASE_DIR=$releaseDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create checksum
        shell: powershell
        run: |
          $exe = Join-Path $env:RELEASE_DIR "窗口布局启动器.exe"
          $checksum = Join-Path $env:RELEASE_DIR "SHA256SUMS.txt"
          $hash = (Get-FileHash -LiteralPath $exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  窗口布局启动器.exe" | Set-Content -LiteralPath $checksum -Encoding UTF8
          Get-Content -LiteralPath $checksum

      - name: Publish or repair GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $exe = Join-Path $env:RELEASE_DIR "窗口布局启动器.exe"
          $checksum = Join-Path $env:RELEASE_DIR "SHA256SUMS.txt"

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $exe $checksum --clobber --repo $env:GITHUB_REPOSITORY
          } else {
            gh release create $tag `
              --repo $env:GITHUB_REPOSITORY `
              --title "窗口布局启动器 $tag" `
              --generate-notes `
              $exe `
              $checksum
          }
