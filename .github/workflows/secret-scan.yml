name: Secret scan

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  current-tree:
    name: Current tree secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Scan current tracked tree
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            dir \
            --redact=100 \
            --no-banner \
            /repo

  historical-audit:
    name: Historical secret audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Audit full Git history
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            git \
            --redact=100 \
            --no-banner \
            /repo
